name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: fintool-linux-x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: fintool-linux-aarch64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: fintool-macos-aarch64
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            artifact: fintool-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update && sudo apt-get install -y musl-tools
          # Install cross for aarch64-musl builds
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Install MinGW (Windows cross-compile)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: sudo apt-get update && sudo apt-get install -y mingw-w64

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Build (cross - Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --release --target ${{ matrix.target }}
        env:
          CROSS_CONTAINER_OPTS: "--platform linux/amd64"

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }}
        env:
          # Static linking for musl targets is automatic
          # For Windows GNU, link statically
          RUSTFLAGS: ${{ matrix.target == 'x86_64-pc-windows-gnu' && '-C target-feature=+crt-static' || '' }}

      - name: Package binary
        run: |
          src="target/${{ matrix.target }}/release/fintool"
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            src="${src}.exe"
          fi
          cp "$src" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        run: |
          cd artifacts
          for dir in */; do
            for file in "$dir"*; do
              sha256sum "$file" >> ../checksums.txt
            done
          done
          cat ../checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/fintool-linux-x86_64/fintool-linux-x86_64
            artifacts/fintool-linux-aarch64/fintool-linux-aarch64
            artifacts/fintool-macos-aarch64/fintool-macos-aarch64
            artifacts/fintool-windows-x86_64.exe/fintool-windows-x86_64.exe
            checksums.txt
